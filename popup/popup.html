<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <div class="main-header">
            <h1>
                <a href="https://www.perplexity.ai/" target="_blank" rel="noreferrer"
                    style="text-decoration: none; display: inline-flex;">
                    <img src="../icons/perplexity.png" alt="Perplexity" class="logo-img">
                </a>
                <span>助手</span>
            </h1>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="look">外观</button>
            <button class="tab-btn" data-tab="assist">辅助</button>
            <button class="tab-btn" data-tab="more">其他</button>
        </div>

        <div class="tabs-container">

            <!-- 外观 Tab -->
            <div id="tab-look" class="tab-content active">
                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">清爽模式</div>
                        <div class="desc">移除推广和冗余元素</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="optimizeUI">
                        <span class="toggle-switch"></span>
                    </div>
                </label>

                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="10" rx="2" ry="2"></rect>
                            <line x1="6" y1="12" x2="6" y2="12"></line>
                            <line x1="18" y1="12" x2="18" y2="12"></line>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">宽屏模式</div>
                        <div class="desc">增加对话区域宽度</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="wideScreen">
                        <span class="toggle-switch"></span>
                    </div>
                </label>

                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                            <polyline points="17 6 23 6 23 12"></polyline>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">热门搜索</div>
                        <div class="desc">搜索框显示推荐内容</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="hotSearch">
                        <span class="toggle-switch"></span>
                    </div>
                </label>

            </div>

            <!-- 辅助 Tab -->
            <div id="tab-assist" class="tab-content">
                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">快速验证</div>
                        <div class="desc">自动点击 Cloudflare 验证</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="autoVerify">
                        <span class="toggle-switch"></span>
                    </div>
                </label>

                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 14 20 9 15 4"></polyline>
                            <path d="M4 20v-7a4 4 0 0 1 4-4h12"></path>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">拦截检测</div>
                        <div class="desc">遇到拦截时自动刷新</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="autoRedirect">
                        <span class="toggle-switch"></span>
                    </div>
                </label>

                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16.5 12"></polyline>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">自动保活</div>
                        <div class="desc">防止 Cloudflare 验证过期</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="keepalive">
                        <span class="toggle-switch"></span>
                    </div>
                </label>
            </div>

            <!-- 其他 Tab -->
            <div id="tab-more" class="tab-content">
                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">隐私保护</div>
                        <div class="desc">拦截统计数据上报</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="privacyProtect">
                        <span class="toggle-switch"></span>
                    </div>
                </label>

                <label class="setting-row">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                            </path>
                            <line x1="12" y1="9" x2="12" y2="13"></line>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">降级拦截</div>
                        <div class="desc">检测模型是否被降级</div>
                    </div>
                    <div class="control">
                        <input type="checkbox" id="downgradeCheck">
                        <span class="toggle-switch"></span>
                    </div>
                </label>

                <a href="https://github.com/MasterDevYY/pplx-helper" target="_blank" class="setting-row version-link">
                    <div class="row-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                            </path>
                        </svg>
                    </div>
                    <div class="text-content">
                        <div class="title">MasterDevYY</div>
                        <div class="desc" id="version"></div>
                    </div>
                    <div class="control" style="color: var(--text-secondary);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="7" y1="17" x2="17" y2="7"></line>
                            <polyline points="7 7 17 7 17 17"></polyline>
                        </svg>
                    </div>
                </a>
            </div>
        </div>
    </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
